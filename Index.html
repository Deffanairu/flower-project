<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Rose</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" id="loadingCard">
        <div class="rose-icon">🌹</div>
        <h2>Love.css</h2>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="status-text" id="statusText">Optimizing 3D rendering...</p>
        <button class="btn-bloom" id="bloomBtn" disabled>TAP TO BLOOM</button>
    </div>

    <div class="rose-container hidden" id="roseContainer">
        <div class="rose-3d">
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
            
            <div class="flower-head" id="flowerHead"></div>
        </div>
        <div class="fade-in-text">i coded this for you 🌹</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
